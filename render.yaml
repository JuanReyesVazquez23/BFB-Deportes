services:
  - type: web
    name: bfb-deportes
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /api/health
    envVars:
      - key: ENV
        value: production
      # Se fuerza explícitamente la versión de Python: el archivo
      # .python-version no se respetó (Render usó 3.14 por defecto) y
      # psycopg2-binary quedó roto contra esa versión tan nueva
      # (ImportError: undefined symbol _PyInterpreterState_Get -- típico
      # de incompatibilidad de ABI en versiones de Python recién salidas).
      # PYTHON_VERSION es la forma más autoritativa de fijarla según la
      # propia documentación de Render.
      - key: PYTHON_VERSION
        value: 3.12.8
      # Secretos: se pegan manualmente en el Dashboard de Render (Environment),
      # nunca se escriben aquí ni se suben al repositorio.
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: BALLDONTLIE_API_KEY
        sync: false
      - key: FOOTBALL_DATA_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
